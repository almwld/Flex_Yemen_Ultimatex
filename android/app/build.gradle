plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.almwld.flex_yemen_v2"
    compileSdk 35

    defaultConfig {
        applicationId "com.almwld.flex_yemen_v2"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

android {
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
}

android {
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
}
