workflows:
  android-workflow:
    name: Flex Yemen Ultimate Build
    instance_type: mac_mini_m1
    max_build_duration: 40
    environment:
      flutter: stable
    scripts:
      - name: Hard Reset Android Structure
        script: | 
          flutter create . --platforms android --org com.almwld --project-name flex_yemen
      
      - name: Verify Flutter & Build Fat APK
        script: | 
          # كتابة المانيفست مع دعم v2 embedding
          cat << 'MANIFEST' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.almwld.flex_yemen">
              
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>

              <application
                  android:label="Flex Yemen"
                  android:icon="@mipmap/ic_launcher">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

                  <activity
                      android:name="com.almwld.flex_yemen.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|fontScale"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
          # التأكد من مسار الكود المصدري لأندرويد
          mkdir -p android/app/src/main/kotlin/com/almwld/flex_yemen
          cat << 'KOTLIN' > android/app/src/main/kotlin/com/almwld/flex_yemen/MainActivity.kt
          package com.almwld.flex_yemen
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() { }
          KOTLIN

          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
