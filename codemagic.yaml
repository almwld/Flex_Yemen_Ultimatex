workflows:
  android-workflow:
    name: Flex Yemen Ultimate Build
    instance_type: mac_mini_m1
    max_build_duration: 40
    environment:
      flutter: stable
    scripts:
      - name: Hard Reset & Setup Folders
        script: | 
          # إنشاء الهيكل الرسمي أولاً
          flutter create . --platforms android --org com.almwld --project-name flex_yemen
          mkdir -p lib/screens
          
      - name: Verify Flutter & Build
        script: | 
          # التأكد من صلاحيات الإنترنت والمانيفست
          cat << 'MANIFEST' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.almwld.flex_yemen">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="Flex Yemen" android:icon="@mipmap/ic_launcher">
                  <activity android:name="com.almwld.flex_yemen.MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|fontScale"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
