workflows:
  android-release:
    name: Flex Yemen Auto-Repair Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Repair and Build Android Platform
        script: |
          # حذف المجلدات المعطوبة إن وجدت
          rm -rf android/
          # إجبار فلاتر على إعادة إنشاء ملفات الأندرويد الحديثة
          flutter create --platforms android .
          # جلب المكتبات من جديد
          flutter pub get
      - name: Build Android Release
        script: |
          flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
